start_title: Не знаете с чего начать?
start_description: Пройдите тест — 5 вопросов, и вы получите персональную рекомендацию по формату работы
start_button: Пройти тест →
questions:
  - question: Что вас беспокоит больше всего прямо сейчас?
    options:
      - id: A
        text: Тревога, страхи, панические атаки
        result: therapy
      - id: B
        text: Усталость, апатия, нет сил
        result: therapy
      - id: C
        text: Конфликты в отношениях или на работе
        result: therapy
      - id: D
        text: Не понимаю куда двигаться в профессии
        result: career
      - id: E
        text: Знаю чего хочу, но не могу осуществить
        result: coaching
  - question: Как давно это вас беспокоит?
    options:
      - id: A
        text: Недавно — последний месяц
        result: ""
      - id: B
        text: Несколько месяцев
        result: ""
      - id: C
        text: Больше года
        result: ""
      - id: D
        text: Всегда так было
        result: ""
  - question: Как это влияет на вашу жизнь?
    options:
      - id: A
        text: Мешает работать и концентрироваться
        result: ""
      - id: B
        text: Мешает отношениям с близкими
        result: ""
      - id: C
        text: Мешает отдыхать и спать
        result: ""
      - id: D
        text: Мешает принимать решения
        result: ""
  - question: Что для вас важнее прямо сейчас?
    options:
      - id: A
        text: Разобраться в себе и своём прошлом
        result: therapy
      - id: B
        text: Помочь своему ребёнку
        result: therapy
      - id: C
        text: Найти профессиональный путь
        result: career
      - id: D
        text: Достичь конкретной цели
        result: coaching
  - question: Как вам удобнее работать?
    options:
      - id: A
        text: Онлайн — из любого места
        result: ""
      - id: B
        text: Очно в Москве
        result: ""
      - id: C
        text: Не важно, главное результат
        result: ""
results:
  therapy:
    title: Вам подойдёт психотерапия
    description: Судя по ответам, вы переживаете что-то, что требует внимания к вашему внутреннему состоянию. Психотерапия поможет разобраться в причинах и найти устойчивость.
    cta: Записаться на психотерапию
    href: /zapis/
  career:
    title: Вам подойдёт профнавигация
    description: Вы ищете свой путь или следующий шаг в профессии. Профнавигация поможет прояснить цели и найти направление.
    cta: Записаться на сессию профнавигации
    href: /zapis/
  coaching:
    title: Вам подойдёт сопровождение бизнес-лидеров
    description: У вас есть цель, и вы хотите её достичь. Индивидуальное сопровождение поможет выстроить стратегию и убрать то, что мешает двигаться вперёд.
