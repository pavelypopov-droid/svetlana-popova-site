badge: Психотерапия
title: Тихое пространство внимательного диалога
subtitle: Индивидуальная работа со взрослыми, подростками и детьми. Помогаю разобраться в себе, справиться с тревогой, депрессией и трудными отношениями.
pains:
  - Тревога, страхи и панические атаки не дают жить нормально
  - Ощущение пустоты, апатии, нет сил даже на простые вещи
  - Конфликты в семье или на работе повторяются по кругу
  - Ваш ребёнок стал замкнутым, агрессивным или плохо учится
  - Чувство, что что-то идёт не так, но непонятно что именно
  - Прошлые отношения или травмы мешают строить новые
steps:
  - title: Первая встреча
    desc: Знакомимся, вы рассказываете о своём запросе. Я помогаю сформулировать цель работы. Без давления и оценок.
  - title: Регулярные сессии
    desc: Работаем в комфортном ритме — обычно раз в неделю. Каждая сессия — шаг к пониманию себя и своих паттернов.
  - title: Изменения в жизни
    desc: Постепенно вы начинаете иначе реагировать на ситуации, принимать решения и строить отношения.
methods:
  - Психоанализ
  - Когнитивно-поведенческая терапия (КПТ)
  - Арт-терапия
  - Телесно-ориентированный подход
  - Семейная терапия
results:
  - Тревога снижается, панические атаки прекращаются
  - Появляется энергия и интерес к жизни
  - Отношения с близкими становятся теплее и понятнее
  - Вы лучше понимаете себя и свои реакции
  - Умеете справляться с трудностями без срывов
  - Ребёнок чувствует себя увереннее и спокойнее
child_therapy_badge: Работа с детьми
child_therapy_title: Детская и семейная психотерапия
child_therapy_paragraphs:
  - "Дети не всегда могут сказать словами, что им плохо. Их сигналы — капризы, агрессия, замкнутость, плохая учёба. Я работаю с детьми от 4 лет, подростками и их родителями."
  - "Часто родители тоже приходят на сессии — вместе мы меняем атмосферу в семье. Ребёнок меняется, когда меняется система вокруг него."
  - "Использую игровую терапию, арт-терапию и работу через метафорические карты — это мягко и эффективно."
format: 50–60 минут, очно или онлайн
price: Уточняется на первичной консультации
cta_title: Сделайте первый шаг
cta_subtitle: Первые 15 минут — бесплатно. Я отвечу на ваши вопросы и мы поймём, подходит ли мой формат работы.
cta_button: Записаться на бесплатную консультацию
