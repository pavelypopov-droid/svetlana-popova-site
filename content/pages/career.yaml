pains:
  - Работаете, но чувствуете, что это "не то"
  - Хотите сменить профессию, но страшно начинать с нуля
  - Застряли на одном месте и не знаете, как расти дальше
  - Ваш подросток не знает, куда поступать и кем хочет быть
