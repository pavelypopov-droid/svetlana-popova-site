steps:
  - title: Диагностика
    desc: Определяем ваши сильные стороны, ценности и истинные интересы. Для подростков — профориентационное тестирование.
  - title: Стратегия
    desc: "Вместе строим реалистичный план: что менять, в каком темпе, какие шаги предпринять в ближайшие 3-6 месяцев."
  - title: Итоговый отчёт
    desc: Получаете письменную стратегию и конкретные рекомендации, которые можно использовать самостоятельно.
results:
  - Ясное понимание своего профессионального пути
