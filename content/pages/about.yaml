approach:
  - icon: "🤝"
    title: Безоценочный подход
    text: На наших сессиях нет правильных и неправильных ответов, нет осуждения. Я создаю пространство, где можно говорить о любом — и это само по себе уже часть исцеления.
  - icon: "📐"
    title: Индивидуальный подход
    text: "Я не работаю по шаблону. Для каждого человека — свой темп, свой метод, своя глубина. Иногда нужно несколько сессий, иногда — год. Главное: чтобы изменения были настоящими."
