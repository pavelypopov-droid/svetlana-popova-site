badge: Сопровождение лидеров
title: От цели к результату — без лишних колебаний
subtitle: Для предпринимателей, руководителей и амбициозных специалистов, которые знают чего хотят, но что-то мешает.
hero_quote: Ясность мышления — фундамент правильных решений
comparison_title: Чем сопровождение отличается от терапии?
comparison_coaching_title: Сопровождение лидеров
comparison_coaching_items:
  - Фокус на целях и стратегии
  - Конкретные задачи и сроки
  - Работа с ресурсами и потенциалом
  - Подходит тем, кто готов к действиям
comparison_therapy_title: Психотерапия
comparison_therapy_items:
  - Работа с внутренними переживаниями
  - Глубинные паттерны и эмоции
  - Без привязки к бизнес-задачам
  - Подходит, когда нужно разобраться в себе
pains:
  - Есть цель, но руки не доходят или что-то мешает двигаться
  - Команда не выполняет задачи так, как вы ожидаете
  - Трудно делегировать — всё кажется лучше сделать самому
  - Выгораете, хотя бизнес растёт
  - Не можете выйти из операционки и думать стратегически
  - Принимаете решения медленно или потом сожалеете о них
steps:
  - title: Постановка цели
    desc: Формулируем конкретную, измеримую цель на период работы. Проясняем, что именно мешает двигаться к ней сейчас.
  - title: Ресурсы и стратегия
    desc: Находим внутренние и внешние ресурсы. Строим пошаговую стратегию с конкретными действиями.
  - title: Мониторинг и корректировка
    desc: Отслеживаем прогресс, разбираем препятствия и корректируем план по ходу движения.
results:
  - Ясная стратегия достижения цели
  - Умение делегировать и доверять команде
  - Энергия и фокус вместо выгорания
  - Быстрые и качественные решения без сожалений
  - Баланс между операционкой и стратегическим мышлением
format: Программа 1–3 месяца, сессии раз в неделю
price: Уточняется на первичной консультации
cta_title: Готовы двигаться к цели?
cta_subtitle: Первые 15 минут — бесплатно. Расскажите о своей задаче, и мы поймём, как я могу помочь.
cta_button: Записаться на сессию
