title: 05-fit
question: "Как понять, подойдёт ли мне работа с Вами?"
answer: >-
  Если вы чувствуете, что выросли из текущего уровня, хотите не просто поддержки, а стратегии, готовы к честному и глубокому анализу, хотите перевести внутренний потенциал в реальный результат — скорее всего, мы сработаемся. Я работаю с теми, кто готов к изменениям, а не только к разговорам о них.
order: 5
