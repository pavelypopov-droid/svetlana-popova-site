title: 06-children
question: "С кем Вам проще всего работать: со взрослыми или с детьми?"
answer: >-
  Мне комфортно и глубоко работать и с взрослыми, и с подростками — но задачи разные. Со взрослыми я чаще работаю на уровне стратегии, лидерства, масштабирования и пересборки идентичности. Это работа про решения, ответственность и системные изменения. С подростками — про раскрытие потенциала, формирование устойчивой самооценки и правильной образовательной траектории. Здесь важна деликатность и понимание семейной динамики. Я работаю не «с возрастом», а с потенциалом. Если человек или семья готовы к осознанному процессу — возраст не является ограничением.
order: 6
