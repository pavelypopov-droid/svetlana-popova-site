title: 02-common-request
question: "С каким запросом к Вам чаще всего приходят?"
answer: >-
  Формально — с разными: карьерный выбор, кризис роста, масштабирование дохода, сложные решения, подростковая профориентация. По сути — с ощущением, что «я могу больше, но не понимаю как». Моя задача — диагностировать потенциал, увидеть ограничивающие структуры и выстроить стратегию реализации.
order: 2
