title: 04-who
question: "С кем Вы работаете?"
answer: >-
  С людьми в точке перехода: предприниматели и руководители в период масштабирования, эксперты, выходящие на новый уровень, женщины в пересборке карьеры, семьи и подростки в выборе образовательной траектории. Мне близки люди, которые готовы брать ответственность за своё развитие или те, кто готов прийти к той самой ответственности.
order: 4
