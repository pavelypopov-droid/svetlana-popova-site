title: 03-difference
question: "Чем Ваша работа отличается от классической психотерапии или коучинга?"
answer: >-
  Классическая психотерапия часто фокусируется на прошлом и травме. Коучинг — на целях и действиях. Я соединяю глубину анализа личности и стратегию будущего. Мы не просто разбираем причины — мы проектируем следующую роль, уровень дохода и формат реализации. Работа всегда ориентирована на реальные изменения, а не только на инсайты.
order: 3
