title: 01-wide-profile
question: "Почему Вы работаете и как психотерапевт, и как профориентолог, и как наставник в бизнес-среде? Это широкий профиль?"
answer: >-
  Это не разные профессии — это разные уровни одной системы. В центре моей работы всегда стоит человек и его потенциал. Психотерапия помогает убрать внутренние ограничения и повторяющиеся сценарии. Профориентация и карьерная стратегия позволяют определить, где сильные стороны человека реализуются максимально эффективно. Бизнес-наставничество помогает встроить этот потенциал в реальную экономическую среду. Я работаю не «по направлениям», а по архитектуре личности и стратегии жизни. Поэтому мой профиль не широкий — он интегративный и системный.
order: 1
