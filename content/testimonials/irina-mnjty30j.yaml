result: Вернулась к жизни
text: "Хочу поделиться своим впечатлением от работы со Светланой. \nМы занимались около года. Пришла я в совсем разобранном состоянии: апатия, отсутствие чувств, желаний и интереса к жизни.\nСветлана разобрала мою историю со всех сторон, использовала разные методики, мы вместе исследовали что мне подходит, а что нет. \nОбратила внимание на важные моменты в моей жизни, которых я не замечала. Так, я заново училась жить и смотреть на мир. \nПоддерживала и пробуждала мои внутренние ресурсы, учила чувствовать заново. \nПредложила разные виды самостоятельной работы, которые мне помогают и сейчас. \nРабота была структурирована, нацелена на результат. В итоге жизнь во мне проснулась, наладились отношения с родителями. \nЯ очень благодарна Светлане и желаю всем обрести себя и свой путь:)"
